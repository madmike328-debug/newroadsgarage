<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Roads Garage – Ann Arbor's Trusted Auto Repair</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --card: #1A1A1A;
    --border: #272727;
    --gold: #E8A020;
    --text: #F0EDE6;
    --muted: #888880;
    --faint: #444440;
    --radius: 4px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 400; line-height: 1.6; overflow-x: hidden; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 999; background: rgba(10,10,10,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 68px; }
  .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .logo-icon { width: 36px; height: 36px; background: var(--gold); border-radius: 2px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 22px; height: 22px; fill: #0A0A0A; }
  .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text); line-height: 1.1; }
  .logo-sub { font-size: 0.58rem; font-weight: 400; color: var(--muted); letter-spacing: 0.12em; display: block; text-transform: uppercase; }
